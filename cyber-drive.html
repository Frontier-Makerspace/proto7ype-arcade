          vx:lateralVel*0.8+(Math.random()-0.5)*1.5,
          vy:3+Math.random()*4,
          size:3+Math.random()*5*driftFactor,
          life:25+Math.random()*30,
          maxLife:55,
          color:trailColors[Math.floor(Math.random()*trailColors.length)],
          glow:true,
          shape:'rect',
          gravity:0
        });
      }
    }
  }
}

function update(delta){
  gameTime+=delta;

  // === INVINCIBILITY TIMER ===
  if(invincibleTimer>0) invincibleTimer-=delta;

  // === ZONE PROGRESSION ===
  const zone=getZone();
  zoneTimer+=delta;
  if(zoneTransition>0) zoneTransition=Math.max(0,zoneTransition-delta*0.5); // 2s transition
  if(zoneTimer>=zone.duration && currentZone<ZONES.length-1){
    prevZoneColors=getZoneColors();
    currentZone++;
    zoneTimer=0;
    zoneTransition=1;
    zoneAnnounceTimer=3.5; // show announcement for 3.5s
    // Speed boost on zone change
    speed=Math.min(speed+30, getZone().maxSpd*1.2);
    shakeX=(Math.random()-0.5)*15;
    shakeY=(Math.random()-0.5)*10;
    shakeDecay=0.8;
  }
  if(zoneAnnounceTimer>0) zoneAnnounceTimer-=delta;
  activeColors=getZoneColors();

  // Progressive difficulty from zone
  const curZone=getZone();
  maxSpeed=curZone.maxSpd;

  // Boost input
  boosting=!!(keys['ArrowUp']||keys['KeyW']);
  const braking=!!(keys['ArrowDown']||keys['KeyS']);

  // === SPEED / ACCELERATION ===
  const targetSpeed=braking?0:boosting?maxSpeed*1.25:maxSpeed;
  const accelRate=boosting?30:15;
  const decelRate=braking?120:40;
  if(speed<targetSpeed) speed=Math.min(speed+accelRate*delta,targetSpeed);
  else speed=Math.max(speed-decelRate*delta,targetSpeed);
  speed=Math.max(braking?5:20,speed);

  // Road position advances
  roadPos+=speed*delta*80;

  // === DRIFT PHYSICS ===
  // Read raw steer input
  const leftHeld=!!(keys['ArrowLeft']||keys['KeyA']);
  const rightHeld=!!(keys['ArrowRight']||keys['KeyD']);
  const steerRaw=leftHeld?-1:rightHeld?1:0;

  // steerInput smoothly follows raw input (more precise, less laggy)
  const steerLag=leftHeld||rightHeld?14:18;
  steerInput+=(steerRaw-steerInput)*steerLag*delta;

  // Grip vs drift: at high speed + hard steering, tires break loose
  const speedNorm=speed/maxSpeed; // 0-1
  const steerMag=Math.abs(steerInput);
  // Grip breaks easier — drift initiates faster on curves
  const gripTarget=Math.max(0.15, 1-(steerMag*speedNorm*1.2));
  // Drift builds fast, recovers slower (sustain the slide!)
  const driftBuildRate=driftFactor<(1-gripTarget)?6:2.5;
  driftFactor+=(1-gripTarget-driftFactor)*driftBuildRate*delta;
  driftFactor=Math.max(0,Math.min(1,driftFactor));

  // Lateral velocity: stronger steering force, amplified during drift
  const steerForceAmt=steerInput*speed*0.0014*(1+driftFactor*0.8);
  lateralVel+=steerForceAmt;
  // Grip friction — less damping during drift for sustained slides
  const gripDamp=Math.pow(0.02+gripTarget*0.35, delta);
  lateralVel*=gripDamp;
  // Allow bigger slides for dramatic Akira drifts
  lateralVel=Math.max(-3.0,Math.min(3.0,lateralVel));

  // Apply lateral velocity to player position
  playerX+=lateralVel*delta;

  // Curve influence (road pushes you gently)
  const baseIdx=Math.floor(roadPos/SEG_LENGTH)%segments.length;
  const curSeg=segments[baseIdx];
  const curvePull=curSeg?curSeg.curve*speed*0.000018:0;
  playerX+=curvePull*delta*60;

  // === ROAD BOUNDARY - hard wall ===
  const ROAD_EDGE=0.85;
  if(Math.abs(playerX)>ROAD_EDGE){
    playerX=Math.sign(playerX)*(ROAD_EDGE-0.03); // nudge inward so curve pull doesn't pin us
    lateralVel*=-0.55; // stronger bounce back
    speed*=0.90;
    shakeX=(Math.random()-0.5)*12;
    shakeY=(Math.random()-0.5)*7;
    shakeDecay=0.5;
  }

  // Rumble strip zone
  if(Math.abs(playerX)>0.68&&Math.abs(playerX)<=ROAD_EDGE){
    const amt=(Math.abs(playerX)-0.68)/0.17;
    speed*=1-amt*0.4*delta;
    if(frameCount%2===0){
      shakeX=(Math.random()-0.5)*6*amt;
      shakeY=(Math.random()-0.5)*4*amt;
      shakeDecay=0.2;
    }
  }

  // === VISUAL DRIFT ANGLE (Akira-style yaw, toned down) ===
  const targetDriftAngle=-lateralVel*0.22*(1+driftFactor*0.7);
  driftAngle+=(targetDriftAngle-driftAngle)*6*delta;

  // Tilt (roll) — subtle lean into drift
  const targetTilt=steerInput*0.25+lateralVel*0.06;
  playerTilt+=(targetTilt-playerTilt)*7*delta;

  // === DRIFT SMOKE ===
  driftSmoke=driftFactor>0.3&&speed>60;
  if(driftSmoke&&frameCount%2===0) emitDriftSmoke();

  // === DRIFT SCORE (boosted for Akira-style rewards) ===
  if(driftFactor>0.35&&speed>80){
    driftScoreTimer+=delta;
    const driftPts=driftFactor*speed*delta*0.8; // 2x drift score
    score+=driftPts;
    driftScore+=driftPts;
  }else{
    if(driftScoreTimer>0.5&&driftScore>10){
      // Big bonus for sustained drift
      score+=driftScore*1.0;
    }
    driftScoreTimer=0;
    driftScore=0;
  }

  // Base score from speed (zone multiplier applied)
  score+=speed*delta*0.1*curZone.scoreMul;

  // === TRAFFIC SPAWNING (zone-based) ===
  trafficTimer+=delta;
  const spawnInterval=curZone.trafficInterval;
  if(trafficTimer>spawnInterval){
    spawnTraffic();
    trafficTimer=0;
  }

  // === TRAFFIC UPDATE & COLLISION ===
  for(let i=cars.length-1;i>=0;i--){
    const car=cars[i];
    car.z+=car.speed*delta*80;
    car.segIdx=Math.floor(car.z/SEG_LENGTH)%segments.length;

    const relZ=car.z-roadPos;

    // Remove if passed or too far
    if(relZ<-3000){
      if(!car.passed){ score+=25; car.passed=true; }
      cars.splice(i,1);
      continue;
    }
    if(relZ>SEG_LENGTH*DRAW_DIST*2){ cars.splice(i,1); continue; }

    // Collision: use pure Z distance - tight range so it only triggers
    // when the traffic car is visually overlapping the player
    const lateralDist=Math.abs(playerX-car.offset);

    // Hard collision - only when car is very close in Z
    if(Math.abs(relZ)<SEG_LENGTH*0.7 && lateralDist<0.16 && !car.hitProcessed){
      car.hitProcessed=true;
      if(invincibleTimer<=0){
        hit();
        if(state==='gameOver') return;
      }
    }
    // Near miss - slightly larger Z range
    if(Math.abs(relZ)<SEG_LENGTH*1.5 && lateralDist<0.32 && lateralDist>=0.16 && !car.nearMissed){
      car.nearMissed=true;
      nearMisses++;
      nearMissTimer=90;
      combo++;
      if(combo>maxCombo)maxCombo=combo;
      comboTimer=150;
      score+=80*combo;
      emitNearMiss(c.width/2,c.height*0.7);
    }
  }

  // Combo decay
  if(comboTimer>0) comboTimer-=delta*60;
  else combo=0;

  if(nearMissTimer>0) nearMissTimer-=delta*60;
  if(nearMissTimer<=0) nearMisses=0;
}

// === CONTROLS ===
let keys={};
let gpStartPressed=false,gpCoinPressed=false;
let gpAnalogX=0;
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'&&state!=='playing')startGame();});
document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='ArrowUp'||e.code==='KeyW')boosting=false;});

function handleGamepad(){
  const gp=navigator.getGamepads()[0];
  if(!gp)return;
  
  if(state==='playing'){
    // Analog steering
    gpAnalogX=gp.axes[0]||0;
    if(Math.abs(gpAnalogX)>0.15){
      steerInput=gpAnalogX;
    }else if(!keys['ArrowLeft']&&!keys['ArrowRight']&&!keys['KeyA']&&!keys['KeyD']){
      steerInput*=0.85; // decay
    }
    // Boost - top button (button 7 = R2, or button 0 = bottom face)
    if(gp.buttons[7]?.pressed||gp.buttons[0]?.pressed){
      boosting=true;
    }
  }
  
  // Start button (button 2)
  if(gp.buttons[2]?.pressed&&!gpStartPressed){
    gpStartPressed=true;
    if(state!=='playing')startGame();
  }else if(!gp.buttons[2]?.pressed){
    gpStartPressed=false;
  }
  
  // Coin/Menu button (button 3)
  if(gp.buttons[3]?.pressed&&!gpCoinPressed){
    gpCoinPressed=true;
    if(state==='gameOver'){
      window.location.href='index.html';
    }
  }else if(!gp.buttons[3]?.pressed){
    gpCoinPressed=false;
  }
}

// === MAIN LOOP ===
function loop(time){
  dt=Math.min((time-(lastTime||time))/1000,0.05);
  lastTime=time;
  frameCount++;
  handleGamepad();
  if(state==='playing')update(dt);
  ctx.save();
  if(shakeDecay>0){ctx.translate(shakeX,shakeY);shakeDecay-=dt*5;shakeX*=0.9;shakeY*=0.9;}
  drawSky();
  drawSun();
  drawGrid();
  drawRoadScene();
  drawPlayerCar();
  drawParticles();
  drawScreenEffects();
  ctx.restore();
  drawHUD();
  if(state==='start')drawStartScreen();
  requestAnimationFrame(loop);
}

// === INIT ===
buildRoad();
initStars();
spawnRoadObjects();
requestAnimationFrame(loop);
</script>
